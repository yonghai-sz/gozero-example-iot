syntax = "proto3";

package transform;

option go_package = "./transform";

message ExpandReq {
  string shorten = 1;
}

message ExpandResp {
  string url = 1;
}

message ShortenReq {
  string url = 1;
}

message ShortenResp {
  string shorten = 1;
}

service Transformer {
  rpc Expand(ExpandReq) returns(ExpandResp);
  rpc Shorten(ShortenReq) returns(ShortenResp);
}