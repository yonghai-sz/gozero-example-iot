name: deploy

on:
  workflow_run:
    workflows: ["docker"]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for deploy script)
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy over SSH (docker compose)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_REPO: ${{ github.event.repository.name }}
          TAG: sha-${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          port="${DEPLOY_PORT:-22}"

          ssh -p "${port}" -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "export DEPLOY_PATH='${DEPLOY_PATH}'; export IMAGE_NAMESPACE='${IMAGE_NAMESPACE}'; export IMAGE_REPO='${IMAGE_REPO}'; export TAG='${TAG}'; bash -s" \
            < scripts/deploy-with-docker-compose/remote-deploy.sh

