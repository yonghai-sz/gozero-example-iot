
name: my-local-example

services:
  mysql:
    image: mysql:8.0
    container_name: my-mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: zzz888
      MYSQL_DATABASE: myexampledb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pzzz888"]
      interval: 5s
      timeout: 3s
      retries: 30

  mongo:
    image: mongo:7.0
    container_name: my-mongo-container
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: zzz888
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "root",
          "-p",
          "zzz888",
          "--authenticationDatabase",
          "admin",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.0.11
    container_name: my-redis-container
    command: redis-server --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  etcd:
    image: quay.io/coreos/etcd:v3.6.10
    container_name: my-etcd-container
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://127.0.0.1:2379"]
      interval: 5s
      timeout: 5s
      retries: 30

  emqx:
    image: emqx/emqx:5.8.9
    container_name: my-emqx-container
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - emqx-data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  transform-rpc:
    build:
      context: ../../
      dockerfile: services/rpc-transform/Dockerfile
      target: runtime
    image: my-dev-transform-rpc-image:latest
    container_name: my-dev-transform-rpc-container
    volumes:   
      - backend-data:/app/backend-data 
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy        
      etcd:
        condition: service_healthy
    

  shorturl-api:
    build:
      context: ../../
      dockerfile: services/api/Dockerfile
      target: runtime
    image: my-dev-shorturl-api-image:latest
    container_name: my-dev-shorturl-api-container
    depends_on:
      transform-rpc:
        condition: service_started
    volumes:
      - backend-data:/app/backend-data 
    ports:
      - "8080:8080"

volumes:
  mysql-data:
    name: "my-mysql-data-volume"
  redis-data:
    name: "my-redis-data-volume"
  mongo-data:
    name: "my-mongo-data-volume"
  emqx-data:
    name: "my-emqx-data-volume"
  backend-data:
    name: "my-backend-data-volume"

