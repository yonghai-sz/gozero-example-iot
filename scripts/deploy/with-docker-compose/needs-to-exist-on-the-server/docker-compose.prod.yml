
name: my-deploy-example

services:
  mysql:
    image: mysql:8.0
    container_name: my-mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zzz888}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myexampledb}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-zzz888}"]
      interval: 5s
      timeout: 3s
      retries: 30

  mongo:
    image: mongo:7.0
    container_name: my-mongo-container
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change-me}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "${MONGO_INITDB_ROOT_USERNAME:-root}",
          "-p",
          "${MONGO_ROOT_PASSWORD:-change-me}",
          "--authenticationDatabase",
          "admin",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.0.11
    container_name: my-redis-container
    command: redis-server --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  etcd:
    image: quay.io/coreos/etcd:v3.6.10
    container_name: my-etcd-container
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
    ports:
      - "${ETCD_PORT:-2379}:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://127.0.0.1:2379"]
      interval: 5s
      timeout: 5s
      retries: 30

  emqx:
    image: emqx/emqx:5.8.9
    container_name: my-emqx-container
    ports:
      - "${EMQX_MQTT_PORT:-1883}:1883"
      - "${EMQX_WS_PORT:-8083}:8083"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"
    volumes:
      - emqx-data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  transform-rpc:
    image: ${IMAGE_NAMESPACE:?set IMAGE_NAMESPACE}/${IMAGE_REPO:-gozero-example-iot}-transform-rpc:${TAG:-latest}
    container_name: my-transform-rpc-container
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      etcd:
        condition: service_healthy
    volumes:
      - ./config/transform.yaml:/app/etc/transform.yaml:ro
      - backend-data:/app/backend-data 
    entrypoint: ["./transform-rpc", "-f", "etc/transform.yaml"]

  shorturl-api:
    image: ${IMAGE_NAMESPACE:?set IMAGE_NAMESPACE}/${IMAGE_REPO:-gozero-example-iot}-shorturl-api:${TAG:-latest}
    container_name: my-shorturl-api-container
    depends_on:
      transform-rpc:
        condition: service_started
    ports:
      - "${SHORTURL_API_PORT:-8080}:8080"
    volumes:
      - ./config/shorturl-api.yaml:/app/etc/shorturl-api.yaml:ro
      - backend-data:/app/backend-data 
    entrypoint: ["./shorturl-api", "-f", "etc/shorturl-api.yaml"]

volumes:
  mysql-data:
    name: "my-mysql-data-volume"
  redis-data:
    name: "my-redis-data-volume"
  mongo-data:
    name: "my-mongo-data-volume"
  emqx-data:
    name: "my-emqx-data-volume"
  backend-data:
    name: "my-backend-data-volume"


